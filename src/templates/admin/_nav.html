<style>
.admin-tabs {
  display: flex;
  align-items: flex-end;
  border-bottom: 2px solid var(--c-border, #ccc);
  margin-bottom: 1.5rem;
  gap: 2px;
}
.admin-tabs .tab {
  display: inline-block;
  padding: 0.4rem 1rem;
  font-size: 0.88rem;
  text-decoration: none;
  color: var(--c-text-sub, #555);
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  margin-bottom: -2px;
  background: transparent;
  white-space: nowrap;
}
.admin-tabs .tab:hover {
  background: var(--c-bg-gray, #eee);
  color: var(--c-text-main, #222);
  border-color: var(--c-border, #ccc);
}
.admin-tabs .tab.active {
  background: var(--c-bg-surface, #fff);
  color: var(--c-text-main, #222);
  border-color: var(--c-border, #ccc);
  font-weight: 600;
}
.admin-tabs .spacer { flex: 1; }
.admin-tabs .logout-link {
  font-size: 0.82rem;
  color: var(--c-text-muted, #888);
  text-decoration: none;
  padding: 0.4rem 0.5rem;
  align-self: center;
  margin-bottom: 2px;
}
.admin-tabs .logout-link:hover { color: var(--c-text-main, #222); }
</style>

<nav class="admin-tabs">
  <a href="{{ url_for('admin.candidates') }}" class="tab{% if request.endpoint == 'admin.candidates' %} active{% endif %}">Candidates</a>
  <a href="{{ url_for('admin.keywords') }}"   class="tab{% if request.endpoint == 'admin.keywords' %} active{% endif %}">Keywords</a>
  <a href="{{ url_for('admin.retag') }}"      class="tab{% if request.endpoint == 'admin.retag' %} active{% endif %}">Retag</a>
  <a href="{{ url_for('admin.users') }}"      class="tab{% if request.endpoint == 'admin.users' %} active{% endif %}">Users</a>
  <span class="spacer"></span>
  <a href="{{ url_for('admin.logout') }}" class="logout-link">Log out</a>
</nav>
