{% extends "base.html" %}
{% block title %}Edit Keyword — Admin{% endblock %}

{% block extra_css %}
<style>
.admin-nav { margin-bottom: 1.5rem; font-size: 0.9rem; }
.admin-nav a { margin-right: 1rem; }
.edit-form { max-width: 480px; }
.edit-form label { display: block; margin-bottom: 1rem; font-size: 0.9rem; }
.edit-form input[type=text], .edit-form input[type=number], .edit-form input[type=url] {
  display: block; width: 100%; margin-top: 0.25rem; padding: 0.4rem 0.5rem;
  border: 1px solid var(--c-border, #ccc); border-radius: 3px;
  background: var(--c-bg, #fff); color: var(--c-text, #000); font-size: 0.9rem;
}
.edit-form input[type=number] { width: 5em; }
.edit-form .hint { font-size: 0.78rem; color: var(--c-muted, #666); margin-top: 0.2rem; }
.edit-form .actions { display: flex; gap: 0.8rem; align-items: center; margin-top: 1.2rem; }
</style>
{% endblock %}

{% block content %}
<div class="admin-nav">
  <strong>Admin:</strong>
  <a href="{{ url_for('admin.candidates') }}">Candidates</a>
  <a href="{{ url_for('admin.keywords') }}">Keywords</a>
  <a href="{{ url_for('admin.retag') }}">Retag</a>
  <a href="{{ url_for('admin.logout') }}" style="float:right; color: var(--c-muted,#666)">Log out</a>
</div>

<h2 style="margin-top: 0;">Edit Keyword</h2>

<form method="post" class="edit-form">
  <label>
    Phrase
    <input type="text" name="phrase" value="{{ kw.phrase }}" required>
    <span class="hint">Canonical form, e.g. "schur function"</span>
  </label>

  <label>
    Score (1–10)
    <input type="number" name="score" value="{{ kw.score }}" min="1" max="10" required>
    <span class="hint">10 = core topic, 1 = tangentially relevant</span>
  </label>

  <label>
    URL
    <input type="text" name="url" value="{{ kw.url or '' }}" placeholder="https://symmetricfunctions.com/…">
    <span class="hint">Link to definition page (optional)</span>
  </label>

  <label>
    Tag name
    <input type="text" name="tag_name" value="{{ kw.tag_name or kw.phrase }}">
    <span class="hint">Tag applied to papers (defaults to phrase)</span>
  </label>

  <div class="actions">
    <button type="submit">Save</button>
    <a href="{{ url_for('admin.keywords') }}">Cancel</a>
  </div>
</form>
{% endblock %}
