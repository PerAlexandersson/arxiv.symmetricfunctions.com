{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<h2>Admin Login</h2>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <p style="color: var(--c-error, #c00)">{{ messages[0] }}</p>
  {% endif %}
{% endwith %}
<form method="post" style="max-width: 300px; margin-top: 1rem;">
  <label>Password<br>
    <input type="password" name="password" autofocus style="width: 100%; margin-top: 0.3rem; padding: 0.4rem;">
  </label>
  <br><br>
  <button type="submit">Log in</button>
</form>
{% endblock %}
